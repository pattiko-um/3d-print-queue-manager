<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintQueue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0f0f0f;
    --surface:   #171717;
    --surface2:  #1f1f1f;
    --surface3:  #282828;
    --border:    #2e2e2e;
    --border2:   #3a3a3a;
    --text:      #e8e8e8;
    --text2:     #999;
    --text3:     #666;
    --accent:    #ff6b35;
    --accent2:   #ff8c5a;
    --green:     #4caf7d;
    --yellow:    #f5c842;
    --blue:      #4a9eff;
    --red:       #ff4d4d;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
    --radius:    4px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ---- Layout ---- */
  .app { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 32px;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo::before { content: '⬡'; font-size: 18px; }

  .header-stats {
    display: flex;
    gap: 24px;
    margin-left: auto;
  }

  .hstat {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }
  .hstat-val {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .hstat-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .main {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 56px);
    overflow: hidden;
  }

  /* ---- Sidebar ---- */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .sidebar-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .sidebar-header-buttons {
    display: flex;
    gap: 8px;
  }

  .ticket-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .ticket-list::-webkit-scrollbar { width: 4px; }
  .ticket-list::-webkit-scrollbar-track { background: transparent; }
  .ticket-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .ticket-item {
    padding: 12px;
    border-radius: var(--radius);
    cursor: pointer;
    border: 1px solid transparent;
    margin-bottom: 4px;
    transition: all 0.1s;
    position: relative;
  }
  .ticket-item:hover { background: var(--surface2); border-color: var(--border); }
  .ticket-item.active {
    background: var(--surface2);
    border-color: var(--accent);
  }

  .ticket-item-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }

  .ticket-item-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
    flex: 1;
  }

  .ticket-item-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }

  .ticket-item-stats {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .mini-stat {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }
  .mini-stat span { color: var(--text2); }

  /* ---- Status badges ---- */
  .badge {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 6px;
    border-radius: 2px;
    white-space: nowrap;
  }
  .badge-todo    { background: var(--surface3); color: var(--text3); border: 1px solid var(--border2); }
  .badge-in_progress { background: rgba(245,200,66,0.15); color: var(--yellow); border: 1px solid rgba(245,200,66,0.3); }
  .badge-done    { background: rgba(76,175,125,0.15); color: var(--green);  border: 1px solid rgba(76,175,125,0.3); }
  .badge-printed { background: rgba(76,175,125,0.15); color: var(--green);  border: 1px solid rgba(76,175,125,0.3); }

  /* ---- Detail pane ---- */
  .detail {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .detail-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text3);
  }
  .detail-empty-icon { font-size: 48px; opacity: 0.3; }
  .detail-empty p { font-family: var(--mono); font-size: 12px; }

  .detail-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .detail-title-area { flex: 1; }

  .detail-ticket-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 4px;
  }

  .detail-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .detail-meta {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .detail-meta-item {
    font-size: 12px;
    color: var(--text3);
  }
  .detail-meta-item strong { color: var(--text2); }

  .detail-actions { display: flex; gap: 8px; align-items: center; }

  .detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }
  .detail-body::-webkit-scrollbar { width: 4px; }
  .detail-body::-webkit-scrollbar-track { background: transparent; }
  .detail-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ---- Summary bar ---- */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }

  .summary-cell {
    background: var(--surface);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .summary-val {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }

  .summary-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ---- Section ---- */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ---- Print cards ---- */
  .print-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }

  .print-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.1s;
  }
  .print-card:hover { border-color: var(--border2); }

  .print-card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    cursor: pointer;
  }

  .print-icon {
    width: 32px;
    height: 32px;
    background: var(--surface3);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .print-filename {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .print-quick-stats {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .qstat {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
  }

  .print-card-body {
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    display: grid;
    grid-template-columns: repeat(3, 1fr) auto;
    gap: 12px;
    align-items: start;
  }

  .print-detail-group { display: flex; flex-direction: column; gap: 8px; }

  .pdetail {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .pdetail-label {
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .pdetail-val {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
  }

  .config-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--surface3);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 2px 8px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }

  .print-card-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
  }

  .error-banner {
    background: rgba(255,77,77,0.1);
    border: 1px solid rgba(255,77,77,0.3);
    border-radius: var(--radius);
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--red);
    margin-top: 8px;
  }

  /* ---- Buttons ---- */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface3); border-color: var(--text3); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }

  .btn-sm { padding: 4px 8px; font-size: 11px; }

  .btn-ghost {
    background: transparent;
    border-color: transparent;
    color: var(--text3);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }

  .btn-danger { color: var(--red); }
  .btn-danger:hover { background: rgba(255,77,77,0.1); border-color: rgba(255,77,77,0.3); }

  /* ---- Status select ---- */
  .status-select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    padding-right: 20px;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23666' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 6px center;
  }
  .status-select:focus { border-color: var(--accent); }

  /* ---- Modal ---- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(2px);
    animation: fadeIn 0.15s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 6px;
    width: 520px;
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.15s ease;
  }

  .modal-header {
    padding: 20px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .modal-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .modal-body { padding: 0 24px 24px; }

  /* ---- Form ---- */
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .form-input, .form-textarea, .form-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.1s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent);
  }
  .form-textarea { resize: vertical; min-height: 72px; }

  .form-select {
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23666' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
    padding-right: 28px;
    cursor: pointer;
  }

  .form-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }

  /* ---- STL picker ---- */
  .stl-picker {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    max-height: 260px;
    overflow-y: auto;
  }

  .stl-picker-empty {
    padding: 20px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }

  .stl-file-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .stl-file-row:last-child { border-bottom: none; }
  .stl-file-row:hover { background: var(--surface3); }
  .stl-file-row.selected { background: rgba(255,107,53,0.1); }

  .stl-file-check {
    width: 16px;
    height: 16px;
    border: 1px solid var(--border2);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 10px;
  }
  .stl-file-row.selected .stl-file-check {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .stl-file-name {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .stl-file-size {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }

  /* ---- Toast ---- */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text);
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.2s ease;
    pointer-events: none;
    max-width: 300px;
  }
  #toast.show {
    transform: translateY(0);
    opacity: 1;
  }
  #toast.success { border-left: 3px solid var(--green); }
  #toast.error   { border-left: 3px solid var(--red); }

  /* ---- Notes ---- */
  .notes-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 20px;
    white-space: pre-wrap;
    font-style: italic;
    line-height: 1.6;
  }

  /* ---- Misc ---- */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .loading { opacity: 0.4; font-family: var(--mono); font-size: 12px; }
  .flex { display: flex; }
  .gap-8 { gap: 8px; }
  .ml-auto { margin-left: auto; }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">PrintQueue</div>
    <div class="header-stats" id="headerStats">
      <div class="hstat"><span class="hstat-val" id="stat-todo">—</span><span class="hstat-label">To Do</span></div>
      <div class="hstat"><span class="hstat-val" id="stat-inprog">—</span><span class="hstat-label">In Progress</span></div>
      <div class="hstat"><span class="hstat-val" id="stat-done">—</span><span class="hstat-label">Done</span></div>
      <div class="hstat"><span class="hstat-val" id="stat-time">—</span><span class="hstat-label">Total Print Time</span></div>
      <div class="hstat"><span class="hstat-val" id="stat-filament">—</span><span class="hstat-label">Total Filament</span></div>
    </div>
  </header>

  <div class="main">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Tickets</span>
        <div class="sidebar-header-buttons">
          <button class="btn btn-primary btn-sm" id="rescanBtn" onclick="rescanDirectory()">🔄 Rescan</button>
          <button class="btn btn-primary btn-sm" onclick="openNewTicketModal()">+ New</button>
        </div>
      </div>
      <div class="ticket-list" id="ticketList">
        <div class="loading" style="padding:16px">Loading tickets…</div>
      </div>
    </aside>

    <!-- Detail -->
    <main class="detail" id="detailPane">
      <div class="detail-empty">
        <div class="detail-empty-icon">⬡</div>
        <p>Select a ticket to view details</p>
      </div>
    </main>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modals -->
<div id="modalContainer"></div>

<script>
// ============================================================
// State
// ============================================================
let tickets = [];
let activeTicketId = null;
let stlFiles = [];

// ============================================================
// API
// ============================================================
async function api(path, opts = {}) {
  const res = await fetch('/api' + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ============================================================
// Toast
// ============================================================
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  setTimeout(() => { el.className = ''; }, 3000);
}

// ============================================================
// Stats
// ============================================================
async function loadStats() {
  try {
    const s = await api('/stats');
    document.getElementById('stat-todo').textContent = s.tickets.todo || 0;
    document.getElementById('stat-inprog').textContent = s.tickets.in_progress || 0;
    document.getElementById('stat-done').textContent = s.tickets.done || 0;
    document.getElementById('stat-time').textContent = formatTime(s.total_time_minutes);
    document.getElementById('stat-filament').textContent = `${(s.total_filament_g/1000).toFixed(2)} kg`;
  } catch(e) {}
}

// ============================================================
// Ticket List
// ============================================================
async function loadTickets() {
  tickets = await api('/tickets');
  renderTicketList();
  loadStats();
}

function renderTicketList() {
  const el = document.getElementById('ticketList');
  if (!tickets.length) {
    el.innerHTML = '<div class="loading" style="padding:16px;text-align:center">No tickets yet</div>';
    return;
  }
  el.innerHTML = tickets.map(t => `
    <div class="ticket-item ${t.id === activeTicketId ? 'active' : ''}" onclick="selectTicket(${t.id})">
      <div class="ticket-item-header">
        <div class="ticket-item-title">${esc(t.title)}</div>
        <div class="${badgeClass(t.status)}">${statusLabel(t.status)}</div>
      </div>
      <div class="ticket-item-meta">
        ${t.requester ? `<span>${esc(t.requester)}</span>` : ''}
        <span>${t.print_count} file${t.print_count !== 1 ? 's' : ''}</span>
      </div>
      <div class="ticket-item-stats">
        <div class="mini-stat">⏱ <span>${formatTime(t.total_time_minutes)}</span></div>
        <div class="mini-stat">🧵 <span>${t.total_filament_g.toFixed(0)}g</span></div>
      </div>
    </div>
  `).join('');
}

// ============================================================
// Ticket Detail
// ============================================================
async function selectTicket(id) {
  activeTicketId = id;
  renderTicketList();
  const ticket = await api(`/tickets/${id}`);
  renderDetail(ticket);
}

function renderDetail(ticket) {
  const pane = document.getElementById('detailPane');
  const printsDone = ticket.prints.filter(p => p.status === 'printed').length;
  const printsTotal = ticket.prints.length;
  const pct = printsTotal > 0 ? Math.round(printsDone / printsTotal * 100) : 0;

  pane.innerHTML = `
    <div class="detail-header">
      <div class="detail-title-area">
        <div class="detail-ticket-id">TICKET #${String(ticket.id).padStart(4,'0')}</div>
        <div class="detail-title">${esc(ticket.title)}</div>
        <div class="detail-meta">
          ${ticket.requester ? `<div class="detail-meta-item">from <strong>${esc(ticket.requester)}</strong></div>` : ''}
          <div class="detail-meta-item">created <strong>${fmtDate(ticket.created_at)}</strong></div>
          <select class="status-select" onchange="updateTicketStatus(${ticket.id}, this.value)">
            <option value="todo" ${ticket.status==='todo'?'selected':''}>To Do</option>
            <option value="in_progress" ${ticket.status==='in_progress'?'selected':''}>In Progress</option>
            <option value="done" ${ticket.status==='done'?'selected':''}>Done</option>
          </select>
        </div>
      </div>
      <div class="detail-actions">
        <button class="btn btn-sm" onclick="openEditTicketModal(${ticket.id})">Edit</button>
        <button class="btn btn-sm btn-ghost btn-danger" onclick="deleteTicket(${ticket.id})">Delete</button>
      </div>
    </div>
    <div class="detail-body">
      ${ticket.notes ? `<div class="notes-block">${esc(ticket.notes)}</div>` : ''}

      <div class="summary-bar">
        <div class="summary-cell">
          <div class="summary-val">${printsTotal}</div>
          <div class="summary-label">Files</div>
        </div>
        <div class="summary-cell">
          <div class="summary-val">${formatTime(ticket.total_time_minutes)}</div>
          <div class="summary-label">Est. Print Time</div>
        </div>
        <div class="summary-cell">
          <div class="summary-val">${ticket.total_filament_g.toFixed(1)}g</div>
          <div class="summary-label">Est. Filament</div>
        </div>
        <div class="summary-cell">
          <div class="summary-val">${pct}%</div>
          <div class="summary-label">Printed</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
      </div>

      <div class="section-head">
        <div class="section-label">Print Files (${printsTotal})</div>
        <button class="btn btn-sm" onclick="openAddPrintsModal(${ticket.id})">+ Add Files</button>
      </div>

      <div class="print-list">
        ${ticket.prints.length === 0
          ? `<div class="loading" style="text-align:center;padding:20px">No files attached — click "+ Add Files" to scan stl_files/</div>`
          : ticket.prints.map(p => renderPrintCard(p)).join('')}
      </div>
    </div>
  `;
}

function renderPrintCard(p) {
  const cfg = p.config || {};
  const hasError = !!p.parse_error;
  const hasIssues = p.issues && p.issues.length > 0;

  return `
    <div class="print-card" id="print-${p.id}">
      <div class="print-card-header">
        <div class="print-icon">${hasIssues ? '⚠️' : 'STL'}</div>
        <div class="print-filename">${esc(p.filename)}</div>
        <div class="print-quick-stats">
          ${!hasError ? `
            <div class="qstat">⏱ ${p.time_formatted || '—'}</div>
            <div class="qstat">🧵 ${p.filament_mass_g != null ? p.filament_mass_g + 'g' : '—'}</div>
          ` : '<div class="qstat" style="color:var(--red)">⚠ parse error</div>'}
        </div>
        <div class="${badgeClass('print-'+p.status)}">${printStatusLabel(p.status)}</div>
      </div>
      ${hasError ? `<div class="error-banner" style="margin:0 14px 12px">Error: ${esc(p.parse_error)}</div>` : ''}
      ${hasIssues ? `<div class="error-banner" style="margin:0 14px 12px;background:rgba(245,200,66,0.1);border-color:rgba(245,200,66,0.3);color:var(--yellow)">Issues: ${p.issues.join(', ')}</div>` : ''}
      ${!hasError ? `
      <div class="print-card-body">
        <div class="print-detail-group">
          <div class="pdetail">
            <div class="pdetail-label">Dimensions</div>
            <div class="pdetail-val">${p.size_x_mm}×${p.size_y_mm}×${p.size_z_mm} mm</div>
          </div>
          <div class="pdetail">
            <div class="pdetail-label">Volume</div>
            <div class="pdetail-val">${p.volume_mm3 != null ? p.volume_mm3.toFixed(0) + ' mm³' : '—'}</div>
          </div>
          <div class="pdetail">
            <div class="pdetail-label">Triangles</div>
            <div class="pdetail-val">${p.triangle_count != null ? p.triangle_count.toLocaleString() : '—'}</div>
          </div>
        </div>
        <div class="print-detail-group">
          <div class="pdetail">
            <div class="pdetail-label">Print Time</div>
            <div class="pdetail-val">${p.time_formatted || '—'} <span style="color:var(--text3);font-size:10px">(${p.time_minutes?.toFixed(0)} min)</span></div>
          </div>
          <div class="pdetail">
            <div class="pdetail-label">Filament</div>
            <div class="pdetail-val">${p.filament_mass_g != null ? p.filament_mass_g + 'g' : '—'} / ${p.filament_length_m != null ? p.filament_length_m + 'm' : '—'}</div>
          </div>
          <div class="pdetail">
            <div class="pdetail-label">Layers</div>
            <div class="pdetail-val">${p.layer_count != null ? p.layer_count.toLocaleString() : '—'}</div>
          </div>
        </div>
        <div class="print-detail-group">
          <div class="pdetail">
            <div class="pdetail-label">Config</div>
            <div class="pdetail-val" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:2px">
              ${cfg.layer_height_mm != null ? `<span class="config-pill">${cfg.layer_height_mm}mm layer</span>` : ''}
              ${cfg.nozzle_diameter_mm != null ? `<span class="config-pill">⌀${cfg.nozzle_diameter_mm} nozzle</span>` : ''}
              ${cfg.infill_pct != null ? `<span class="config-pill">${cfg.infill_pct}% infill</span>` : ''}
              ${cfg.supports ? `<span class="config-pill">supports: ${cfg.supports}</span>` : ''}
              ${cfg.filament ? `<span class="config-pill">${cfg.filament}</span>` : ''}
            </div>
          </div>
        </div>
        <div class="print-card-actions">
          <select class="status-select" onchange="updatePrintStatus(${p.id}, this.value)">
            <option value="todo" ${p.status==='todo'?'selected':''}>To Do</option>
            <option value="in_progress" ${p.status==='in_progress'?'selected':''}>In Progress</option>
            <option value="printed" ${p.status==='printed'?'selected':''}>Printed</option>
          </select>
          <button class="btn btn-sm btn-ghost" onclick="reanalyzePrint(${p.id})" title="Re-run analysis">↺ Re-scan</button>
          <button class="btn btn-sm btn-ghost btn-danger" onclick="deletePrint(${p.id})">Remove</button>
        </div>
      </div>
      ` : `
      <div class="print-card-body" style="grid-template-columns:1fr auto">
        <div></div>
        <div class="print-card-actions">
          <button class="btn btn-sm btn-ghost" onclick="reanalyzePrint(${p.id})">↺ Re-scan</button>
          <button class="btn btn-sm btn-ghost btn-danger" onclick="deletePrint(${p.id})">Remove</button>
        </div>
      </div>
      `}
    </div>
  `;
}

// ============================================================
// Actions
// ============================================================
async function updateTicketStatus(id, status) {
  await api(`/tickets/${id}`, { method: 'PATCH', body: { status } });
  await loadTickets();
  if (activeTicketId === id) {
    const t = await api(`/tickets/${id}`);
    renderDetail(t);
  }
  toast(`Ticket marked ${statusLabel(status)}`);
}

async function updatePrintStatus(printId, status) {
  await api(`/prints/${printId}`, { method: 'PATCH', body: { status } });
  const t = await api(`/tickets/${activeTicketId}`);
  renderDetail(t);
  await loadStats();
  toast(`Print marked ${printStatusLabel(status)}`);
}

async function deleteTicket(id) {
  if (!confirm('Delete this ticket and all its prints?')) return;
  await api(`/tickets/${id}`, { method: 'DELETE' });
  activeTicketId = null;
  document.getElementById('detailPane').innerHTML = `
    <div class="detail-empty">
      <div class="detail-empty-icon">⬡</div>
      <p>Select a ticket to view details</p>
    </div>`;
  await loadTickets();
  toast('Ticket deleted');
}

async function deletePrint(id) {
  if (!confirm('Remove this file from the ticket?')) return;
  const ticket = await api(`/prints/${id}`, { method: 'DELETE' });
  renderDetail(ticket);
  await loadTickets();
  toast('File removed');
}

async function reanalyzePrint(id) {
  toast('Re-scanning STL…');
  const ticket = await api(`/prints/${id}/reanalyze`, { method: 'POST' });
  renderDetail(ticket);
  toast('Re-scan complete');
}

// ============================================================
// Modals
// ============================================================
function closeModal() {
  document.getElementById('modalContainer').innerHTML = '';
}

function showModal(html) {
  const c = document.getElementById('modalContainer');
  c.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}

// --- New Ticket ---
function openNewTicketModal() {
  showModal(`
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">New Ticket</div>
        <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Title *</label>
          <input class="form-input" id="nt-title" placeholder="e.g. Robotics Club — Arm Parts" autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Requester</label>
          <input class="form-input" id="nt-req" placeholder="Name or team">
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea class="form-textarea" id="nt-notes" placeholder="Any special instructions…"></textarea>
        </div>
        <div class="form-footer">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="submitNewTicket()">Create Ticket</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('nt-title').focus();
}

async function submitNewTicket() {
  const title = document.getElementById('nt-title').value.trim();
  if (!title) { toast('Title is required', 'error'); return; }
  const ticket = await api('/tickets', {
    method: 'POST',
    body: {
      title,
      requester: document.getElementById('nt-req').value.trim(),
      notes: document.getElementById('nt-notes').value.trim(),
    }
  });
  closeModal();
  await loadTickets();
  selectTicket(ticket.id);
  toast('Ticket created');
}

// --- Edit Ticket ---
async function openEditTicketModal(id) {
  const t = await api(`/tickets/${id}`);
  showModal(`
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Edit Ticket #${String(id).padStart(4,'0')}</div>
        <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Title *</label>
          <input class="form-input" id="et-title" value="${esc(t.title)}">
        </div>
        <div class="form-group">
          <label class="form-label">Requester</label>
          <input class="form-input" id="et-req" value="${esc(t.requester || '')}">
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea class="form-textarea" id="et-notes">${esc(t.notes || '')}</textarea>
        </div>
        <div class="form-footer">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="submitEditTicket(${id})">Save Changes</button>
        </div>
      </div>
    </div>
  `);
}

async function submitEditTicket(id) {
  const title = document.getElementById('et-title').value.trim();
  if (!title) { toast('Title is required', 'error'); return; }
  const ticket = await api(`/tickets/${id}`, {
    method: 'PATCH',
    body: {
      title,
      requester: document.getElementById('et-req').value.trim(),
      notes: document.getElementById('et-notes').value.trim(),
    }
  });
  closeModal();
  await loadTickets();
  renderDetail(ticket);
  toast('Ticket updated');
}

// --- Add Prints ---
async function openAddPrintsModal(ticketId) {
  stlFiles = await api('/stl-files');

  // Which files are already attached?
  const ticket = await api(`/tickets/${ticketId}`);
  const attached = new Set(ticket.prints.map(p => p.filename));
  const available = stlFiles.filter(f => !attached.has(f.filename));

  let selected = new Set();

  function fileRowHtml(f) {
    const sel = selected.has(f.filename);
    return `
      <div class="stl-file-row ${sel ? 'selected' : ''}" onclick="toggleStlFile('${f.filename}')">
        <div class="stl-file-check">${sel ? '✓' : ''}</div>
        <div class="stl-file-name">${esc(f.filename)}</div>
        <div class="stl-file-size">${fmtBytes(f.size_bytes)}</div>
      </div>
    `;
  }

  function renderPicker() {
    const el = document.getElementById('stl-picker');
    if (!available.length) {
      el.innerHTML = `<div class="stl-picker-empty">No new STL files found in stl_files/<br><span style="font-size:10px;color:var(--text3)">Drop .stl files into the stl_files/ directory, then refresh</span></div>`;
      return;
    }
    el.innerHTML = available.map(fileRowHtml).join('');
  }

  window.toggleStlFile = function(name) {
    if (selected.has(name)) selected.delete(name);
    else selected.add(name);
    renderPicker();
  };

  showModal(`
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Add STL Files</div>
        <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:12px;color:var(--text3);margin-bottom:12px">
          Showing files in <code style="background:var(--surface3);padding:2px 6px;border-radius:3px;font-size:11px">stl_files/</code> not yet attached to this ticket.
        </p>
        <div class="stl-picker" id="stl-picker"></div>
        <div class="form-footer">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="submitAddPrints(${ticketId})">Add Selected</button>
        </div>
      </div>
    </div>
  `);

  renderPicker();

  window.submitAddPrints = async function(tid) {
    if (!selected.size) { toast('Select at least one file', 'error'); return; }
    toast(`Adding ${selected.size} file(s)… analyzing STLs`);
    closeModal();
    for (const filename of selected) {
      await api(`/tickets/${tid}/prints`, { method: 'POST', body: { filename } });
    }
    const ticket = await api(`/tickets/${tid}`);
    renderDetail(ticket);
    await loadTickets();
    toast(`Added ${selected.size} file(s)`);
  };
}

// ============================================================
// Helpers
// ============================================================
function badgeClass(status) {
  const map = {
    'todo': 'badge badge-todo',
    'in_progress': 'badge badge-in_progress',
    'done': 'badge badge-done',
    'print-todo': 'badge badge-todo',
    'print-in_progress': 'badge badge-in_progress',
    'print-printed': 'badge badge-printed',
  };
  return map[status] || 'badge badge-todo';
}

function statusLabel(s) {
  return { todo: 'To Do', in_progress: 'In Progress', done: 'Done' }[s] || s;
}

function printStatusLabel(s) {
  return { todo: 'To Do', in_progress: 'Printing', printed: 'Printed' }[s] || s;
}

function formatTime(mins) {
  if (!mins) return '—';
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(0) + ' KB';
  return (b/1024/1024).toFixed(1) + ' MB';
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ============================================================
// Import from directory
// ============================================================
async function rescanDirectory() {
  const btn = document.getElementById('rescanBtn');
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ Scanning…';
  
  // Show progress modal
  showModal(`
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Importing from Directory</div>
      </div>
      <div class="modal-body">
        <div id="importProgress">Scanning directory...</div>
        <div id="importFiles" style="margin-top: 16px;"></div>
      </div>
    </div>
  `);
  
  try {
    const res = await api('/import-from-directory', { method: 'POST', body: {} });
    
    // Update progress with files
    const filesDiv = document.getElementById('importFiles');
    if (res.files_processed && res.files_processed.length > 0) {
      filesDiv.innerHTML = '<div style="font-size: 12px; color: var(--text3); margin-bottom: 8px;">Files processed:</div>' +
        res.files_processed.map((f, i) => {
          const statusIcon = f.status === 'completed' ? '✅' : f.status === 'error' ? '❌' : f.status === 'skipped' ? '⏭️' : '⏳';
          return `<div style="font-size: 11px; margin-bottom: 4px;">${i+1}. ${statusIcon} ${f.filename} (${f.status})</div>`;
        }).join('');
    }
    
    document.getElementById('importProgress').innerHTML = 'Import complete!';
    
    if (res.created_tickets || res.updated_tickets || res.added_prints) {
      const msg = [
        res.created_tickets > 0 && `${res.created_tickets} new ticket(s)`,
        res.updated_tickets > 0 && `${res.updated_tickets} updated`,
        res.added_prints > 0 && `${res.added_prints} print(s) added`,
      ].filter(Boolean).join(', ');
      
      toast(`✓ Import complete: ${msg}`, 'success');
      await loadTickets();
    } else {
      toast('No new tickets or prints found', 'info');
    }
    
    if (res.errors && res.errors.length > 0) {
      toast(`⚠ ${res.errors.length} error(s) during import`, 'warning');
      console.log('Import errors:', res.errors);
    }
  } catch (err) {
    document.getElementById('importProgress').innerHTML = 'Import failed!';
    toast('Failed to scan directory: ' + err.message, 'error');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.innerHTML = original;
  }
}

// ============================================================
// Keyboard shortcuts
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') {
    e.preventDefault();
    openNewTicketModal();
  }
});

// ============================================================
// Init
// ============================================================
loadTickets();
</script>
