<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintQueue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app">
  <header>
    <div class="logo" onclick="showTicketBoard()" role="button" tabindex="0">PrintQueue</div>
    <div class="header-stats" id="headerStats">
      <div class="hstat"><span class="hstat-val" id="stat-todo">—</span><span class="hstat-label">Received</span></div>
      <div class="hstat"><span class="hstat-val" id="stat-inprog">—</span><span class="hstat-label">In Progress</span></div>
      <div class="hstat"><span class="hstat-val" id="stat-done">—</span><span class="hstat-label">Complete</span></div>
      <div class="hstat"><span class="hstat-val" id="stat-time">—</span><span class="hstat-label">Total Print Time</span></div>
      <div class="hstat"><span class="hstat-val" id="stat-filament">—</span><span class="hstat-label">Total Filament</span></div>
    </div>
  </header>

  <div class="main">
    <section class="ticket-index">
      <div class="ticket-header">
        <span class="sidebar-title">Tickets</span>
        <div class="sidebar-header-buttons">
          <button class="btn btn-primary btn-sm" id="rescanBtn" onclick="rescanDirectory()">🔄 Scan Directory</button>
        <button class="btn btn-secondary btn-sm" onclick="showDeliveredTickets()">Delivered</button>
        <button class="btn btn-primary btn-sm" onclick="openNewTicketModal()">+ New</button>
        </div>
      </div>
      <div class="ticket-list" id="ticketList">
        <div class="loading" style="padding:16px">Loading tickets…</div>
      </div>
    </section>

    <main class="detail" id="detailPane">
      <div class="detail-empty">
        <div class="detail-empty-icon">⬡</div>
        <p>Select a ticket to view details</p>
      </div>
    </main>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modals -->
<div id="modalContainer"></div>

<script src="/static/app.js"></script>
</body>
</html>
